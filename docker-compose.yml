version: '3.8'

services:
  cpstest-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Passate a build time perché Next.js le incorpora nel bundle JS
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: cpstest-prod
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - .env.local
